# Local development — use when ready
# Run: docker-compose up

version: "3.8"

services:
  api:
    build: ./api
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      - ./api:/app
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  web:
    build: ./web
    ports:
      - "3000:3000"
    env_file: .env
    volumes:
      - ./web:/app
      - /app/node_modules
    command: npm run dev
    depends_on:
      - api
